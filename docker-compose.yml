services:
  postgres:
    image: postgres:16-alpine
    container_name: hypedrop-postgres
    environment:
      POSTGRES_DB: hypedrop
      POSTGRES_USER: hypedrop
      POSTGRES_PASSWORD: hypedrop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hypedrop-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: